
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Погодное приложение</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-4">
<h1>🌤 Погодное приложение</h1>

<a href="/history" class="btn btn-secondary mb-3">История запросов</a>

<form method="post" class="card p-3 mb-3">
<input type="text" name="city" class="form-control" placeholder="Введите город">
<button class="btn btn-primary mt-2">Найти</button>
</form>

<div id="weatherBox" class="weather-card">
{% if weather %}
<h3>{{weather.icon}} {{weather.place}}</h3>
<p>Температура: {{weather.temp}} °C</p>
<p>Ветер: {{weather.wind}} км/ч</p>
{% else %}
Выберите город или нажмите на карту.
{% endif %}
</div>

<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let startLat={% if weather %}{{weather.lat}}{% else %}55.1694{% endif %};
let startLon={% if weather %}{{weather.lon}}{% else %}23.8813{% endif %};
let startZoom={% if weather %}10{% else %}6{% endif %};

let map=L.map('map').setView([startLat,startLon],startZoom);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let currentMarker=null;

{% if weather %}
currentMarker=L.marker([{{weather.lat}},{{weather.lon}}]).addTo(map)
.bindPopup("<b>{{weather.place}}</b><br>{{weather.icon}} {{weather.temp}} °C")
.openPopup();
{% endif %}

map.on('click', async function(e){

 let r=await fetch(`/weather_click?lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
 let d=await r.json();

 if(currentMarker){
   map.removeLayer(currentMarker);
 }

 currentMarker=L.marker([d.lat,d.lon]).addTo(map)
 .bindPopup(`<b>${d.place}</b><br>${d.icon} ${d.temp} °C<br>💨 ${d.wind} км/ч`)
 .openPopup();

 map.setView([d.lat,d.lon],10);

 document.getElementById("weatherBox").innerHTML=`
 <h3>${d.icon} ${d.place}</h3>
 <p>Температура: ${d.temp} °C</p>
 <p>Ветер: ${d.wind} км/ч</p>
 `;
});
</script>
</body>
</html>
